services:
  - type: web
    name: gold-price-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: cd production && python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: LOG_LEVEL
        value: INFO
      - key: API_DEBUG
        value: "false"
    autoDeploy: true